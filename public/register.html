<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Register</title><link rel="stylesheet" href="/css/styles.css"><style>#s2{display:none}.fp-box{background:#1e293b;border-radius:16px;padding:2rem;text-align:center;margin:1rem 0}.fp-svg{width:90px;height:90px;margin:0 auto 1rem;display:block}.fp-t{color:#fff;font-size:1.1rem;font-weight:600;margin-bottom:.4rem}.fp-s{color:#94a3b8;font-size:.85rem;margin-bottom:1rem}.fp-bar{height:4px;background:#334155;border-radius:99px;overflow:hidden;margin-bottom:.75rem}.fp-f{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:99px;transition:width .3s}</style></head><body><nav><a href="/index.html">Home</a><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/login.html">Login</a></nav><main><section class="card" style="max-width:420px;margin:0 auto;"><div id="s1"><h1>Student Registration</h1><form id="rf" novalidate><div class="form-group"><label>Username</label><input type="text" id="ru" placeholder="Enter your username"><span class="error-msg" id="rue"></span></div><div class="form-group"><label>Registration Number</label><input type="text" id="rn" placeholder="e.g. 22/BCC/BU/R/0014"><span class="error-msg" id="rne"></span></div><div class="form-group"><label>Password</label><div style="position:relative;"><input type="password" id="rp" placeholder="Enter password" autocomplete="new-password" style="padding-right:2.75rem;"><button type="button" onclick="togglePw('rp',this)" tabindex="-1" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:.25rem;color:#94a3b8;display:flex;align-items:center;" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div><span class="error-msg" id="rpe"></span></div><button type="submit" id="nextBtn">Next</button><p class="error-msg" id="re"></p></form><p style="margin-top:1rem;color:var(--text-muted);font-size:.9rem;">Already registered? <a href="/login.html">Login here</a></p></div><div id="s2"><h1 id="bioTitle">Register Biometrics</h1><p id="bioDesc" style="color:var(--text-muted);font-size:.9rem;margin-bottom:1rem;"></p><div class="fp-box"><svg id="iconFP" class="fp-svg" viewBox="0 0 100 100"><defs><linearGradient id="fpG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#7c3aed"/></linearGradient></defs><g stroke="url(#fpG)" stroke-width="2.5" fill="none" stroke-linecap="round"><path d="M50 15C30 15,15 30,15 50C15 70,30 85,50 85C70 85,85 70,85 50C85 30,70 15,50 15"/><path d="M50 22C34 22,22 34,22 50C22 66,34 78,50 78C66 78,78 66,78 50C78 34,66 22,50 22"/><path d="M50 29C38 29,29 38,29 50C29 62,38 71,50 71C62 71,71 62,71 50C71 38,62 29,50 29"/><path d="M50 36C42 36,36 42,36 50C36 58,42 64,50 64C58 64,64 58,64 50C64 42,58 36,50 36"/><path d="M50 43C46 43,43 46,43 50C43 54,46 57,50 57C54 57,57 54,57 50C57 46,54 43,50 43"/><circle cx="50" cy="50" r="3" fill="url(#fpG)" stroke="none"/></g><line id="sl" x1="15" y1="50" x2="85" y2="50" stroke="#2563eb" stroke-width="2" opacity="0"/></svg><svg id="iconFace" class="fp-svg" viewBox="0 0 100 100" style="display:none"><defs><linearGradient id="faceG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#7c3aed"/></linearGradient></defs><g stroke="url(#faceG)" stroke-width="2.5" fill="none" stroke-linecap="round"><path d="M20 38 L20 22 L38 22" stroke-width="3.5"/><path d="M62 22 L80 22 L80 38" stroke-width="3.5"/><path d="M80 62 L80 78 L62 78" stroke-width="3.5"/><path d="M38 78 L20 78 L20 62" stroke-width="3.5"/><circle cx="37" cy="44" r="4" fill="url(#faceG)" stroke="none"/><circle cx="63" cy="44" r="4" fill="url(#faceG)" stroke="none"/><path d="M50 48 L47 57 Q50 60 53 57 Z" fill="url(#faceG)" stroke="none"/><path d="M37 66 Q50 76 63 66"/></g></svg><div class="fp-t" id="ft">Ready</div><div class="fp-s" id="fs">Tap below</div><div class="fp-bar"><div class="fp-f" id="ff"></div></div></div><button id="fb" class="btn-full">Register</button><button id="sk" class="btn-full btn-secondary" style="margin-top:.5rem;">Skip</button><p class="success-msg" id="fok" style="margin-top:.75rem;"></p></div></section></main><script src="/js/nav.js"></script><script>var fi,ua=navigator.userAgent||'',iOS=/iPhone|iPad|iPod/i.test(ua),And=/Android/i.test(ua);function setUI(){if(iOS){document.getElementById('nextBtn').textContent='Next: Register Face ID';document.getElementById('bioTitle').textContent='Register Face ID';document.getElementById('bioDesc').textContent='Look at your device when prompted.';document.getElementById('fb').textContent='Register Face ID';document.getElementById('ft').textContent='Ready for Face ID';document.getElementById('fs').textContent='Tap below to start';document.getElementById('iconFP').style.display='none';document.getElementById('iconFace').style.display='block';}else if(And){document.getElementById('nextBtn').textContent='Next: Register Fingerprint';document.getElementById('bioTitle').textContent='Register Fingerprint';document.getElementById('bioDesc').textContent='Place fingertip on sensor.';document.getElementById('fb').textContent='Register Fingerprint';document.getElementById('ft').textContent='Ready for Fingerprint';document.getElementById('fs').textContent='Tap below to start';}else{document.getElementById('nextBtn').textContent='Next: Register Biometrics';document.getElementById('bioDesc').textContent='Device biometrics will be used.';}}setUI();function bb(b){return btoa(String.fromCharCode.apply(null,new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}function ub(s){var b=s.replace(/-/g,'+').replace(/_/g,'/');return Uint8Array.from(atob(b),c=>c.charCodeAt(0)).buffer}function sa(){var y=15,d=1,p=0,l=document.getElementById('sl'),b=document.getElementById('ff');if(l)l.setAttribute('opacity','0.8');fi=setInterval(()=>{y+=d*2;if(y>=85)d=-1;if(y<=15)d=1;if(l){l.setAttribute('y1',y);l.setAttribute('y2',y);}p=Math.min(p+1,80);b.style.width=p+'%'},50)}function xa(){if(fi){clearInterval(fi);fi=null}var l=document.getElementById('sl');if(l)l.setAttribute('opacity','0')}function ok(){xa();document.getElementById('ff').style.cssText='width:100%;background:#16a34a';document.getElementById('ft').textContent=iOS?'Face ID Registered!':'Fingerprint Registered!';document.getElementById('fs').textContent='Success'}function er(m){xa();document.getElementById('ff').style.cssText='width:100%;background:#dc2626';document.getElementById('ft').textContent='Failed';document.getElementById('fs').textContent=m}document.getElementById('rf').addEventListener('submit',async function(e){e.preventDefault();['rue','rne','rpe','re'].forEach(i=>document.getElementById(i).textContent='');var u=document.getElementById('ru').value.trim(),n=document.getElementById('rn').value.trim(),p=document.getElementById('rp').value,v=1;if(!u){document.getElementById('rue').textContent='Required';v=0}if(!n){document.getElementById('rne').textContent='Required';v=0}if(!p){document.getElementById('rpe').textContent='Required';v=0}if(!v)return;try{var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,reg_number:n,password:p})});var d=await r.json();if(r.status===201){await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reg_number:n,password:p})});document.getElementById('s1').style.display='none';document.getElementById('s2').style.display='block';if(!window.PublicKeyCredential){document.getElementById('ft').textContent='Not Supported';document.getElementById('fs').textContent='Device lacks biometrics';document.getElementById('fb').style.display='none'}}else{document.getElementById('re').textContent=d.error||'Failed'}}catch(e){document.getElementById('re').textContent='Error occurred'}});document.getElementById('fb').addEventListener('click',async function(){document.getElementById('fb').disabled=1;if(iOS){document.getElementById('ft').textContent='Scanning Face...';document.getElementById('fs').textContent='Look at device'}else{document.getElementById('ft').textContent='Scanning...';document.getElementById('fs').textContent='Place finger';sa()}try{var r=await fetch('/api/auth/webauthn/register-challenge');var d=await r.json();var c=await navigator.credentials.create({publicKey:{challenge:ub(d.challenge),rp:{name:'BU Attendance'},user:{id:new TextEncoder().encode(String(d.userId)),name:d.username||'student',displayName:d.username||'Student'},pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});var ci=bb(c.rawId),pk=bb(c.response.getPublicKey?c.response.getPublicKey():c.response.attestationObject);var s=await fetch('/api/auth/webauthn/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({credentialId:ci,publicKey:pk})});if(s.ok){ok();document.getElementById('fb').style.display='none';document.getElementById('sk').textContent='Continue';document.getElementById('fok').textContent='Done!';setTimeout(()=>window.location.href='/login.html',2000)}else{er('Could not save');document.getElementById('fb').disabled=0}}catch(e){er(e.message||'Cancelled');document.getElementById('fb').disabled=0}});document.getElementById('sk').addEventListener('click',()=>window.location.href='/login.html');</script></body></html>
