<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BU Attendance Portal - Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/contact.html">Contact</a>
    <a href="/login.html">Login</a>
  </nav>
  <main>
    <section class="card" style="max-width:420px;margin:0 auto;">
      <h1>Login</h1>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-reg">Registration Number</label>
          <input type="text" id="login-reg" placeholder="e.g. 22/BCC/BU/R/0014" autocomplete="username" required>
          <span class="error-msg" id="reg-error"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required style="padding-right:2.75rem;">
            <button type="button" onclick="togglePw('login-password',this)" tabindex="-1" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:.25rem;color:#94a3b8;display:flex;align-items:center;" aria-label="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="error-msg" id="password-error"></span>
        </div>
        <button type="submit">Login</button>
        <p class="error-msg" id="login-error"></p>
      </form>
      <p style="margin-top:1rem;color:var(--text-muted);font-size:.9rem;">
        New student? <a href="/register.html">Register here</a>
      </p>
    </section>
  </main>
  <script src="/js/nav.js"></script>
  <script src="/js/validator.js"></script>
  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.style.color = isHidden ? '#2563eb' : '#94a3b8';
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      btn.querySelector('svg').innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
